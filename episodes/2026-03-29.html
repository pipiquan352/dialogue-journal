<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Dialogue Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #F7F2EB;
      --ink: #2E2420;
      --ink-soft: #5C4D44;
      --ink-muted: #A0907E;
      --terracotta: #BF6B3F;
      --terracotta-glow: #D4885E;
      --olive: #6A7E52;
      --olive-soft: #8BA072;
      --sand-warm: #EDE4D6;
      --sand-deep: #D9CCBA;
      --accent-line: #CFC0AD;
      --highlight-bg: #F0E6D8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      position: relative;
    }

    /* Paper grain texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      background-size: 256px 256px;
      pointer-events: none;
      z-index: 100;
    }

    /* ========== Page Layout ========== */
    .page {
      max-width: 440px;
      margin: 0 auto;
      padding: 0 28px;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ========== Header ========== */
    .header {
      padding-top: clamp(52px, 14vh, 90px);
      padding-bottom: 48px;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
    }

    .header-date {
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--terracotta);
      margin-bottom: 20px;
    }

    .header-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.6rem, 9vw, 3.4rem);
      font-weight: 700;
      line-height: 1.05;
      color: var(--ink);
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .header-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.15rem, 3.8vw, 1.35rem);
      font-weight: 300;
      font-style: italic;
      color: var(--ink-muted);
      line-height: 1.4;
    }

    .header-intro {
      font-size: 0.85rem;
      line-height: 1.75;
      color: var(--ink-soft);
      margin-top: 24px;
      max-width: 340px;
    }

    .header-rule {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 36px;
      opacity: 0;
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 1s forwards;
    }

    .header-rule-line {
      height: 1.5px;
      background: var(--terracotta);
      flex: none;
      width: 28px;
      transform-origin: left;
      transform: scaleX(0);
      animation: lineReveal 0.5s cubic-bezier(0.16, 1, 0.3, 1) 1.1s forwards;
    }

    .header-rule-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--terracotta);
      opacity: 0;
      animation: dotPop 0.3s cubic-bezier(0.16, 1, 0.3, 1) 1.4s forwards;
    }

    /* ========== Dialogue ========== */
    .dialogue {
      flex: 1;
      padding-bottom: clamp(60px, 15vh, 100px);
    }

    .turn {
      margin-bottom: 32px;
      opacity: 0;
      transform: translateY(10px);
      position: relative;
    }

    .turn.visible {
      animation: fadeUp 0.55s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Speaker differentiation with left accent */
    .turn-human {
      padding-left: 16px;
      border-left: 2.5px solid var(--terracotta);
    }

    .turn-ai {
      padding-left: 16px;
      border-left: 2.5px solid var(--olive-soft);
    }

    .speaker {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: none;
      margin-bottom: 7px;
    }

    .speaker-human {
      color: var(--terracotta);
    }

    .speaker-ai {
      color: var(--olive);
    }

    .text {
      font-size: 0.92rem;
      line-height: 1.75;
      color: var(--ink);
    }

    .turn-human .text {
      font-weight: 500;
    }

    .turn-ai .text {
      color: var(--ink-soft);
      font-weight: 400;
    }

    /* Emphasis */
    .text em {
      font-style: normal;
      color: var(--terracotta);
      font-weight: 600;
      background: linear-gradient(to top, rgba(191, 107, 63, 0.1) 30%, transparent 30%);
      padding: 0 2px;
    }

    /* Insight — the hero moment */
    .text .insight {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      font-weight: 600;
      font-style: italic;
      color: var(--ink);
      display: block;
      margin-top: 14px;
      line-height: 1.45;
      padding: 16px 18px;
      background: var(--highlight-bg);
      border-radius: 4px;
      position: relative;
    }

    .text .insight::before {
      content: '\201C';
      font-family: 'Cormorant Garamond', serif;
      font-size: 3.5rem;
      font-weight: 700;
      color: var(--terracotta);
      opacity: 0.25;
      position: absolute;
      top: -8px;
      left: 10px;
      line-height: 1;
    }

    /* Breath separator */
    .breath {
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      margin: 8px 0;
      padding-left: 16px;
      opacity: 0;
    }

    .breath.visible {
      animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .breath-line {
      width: 40px;
      height: 1px;
      background: var(--sand-deep);
    }

    /* ========== Footer ========== */
    .footer {
      padding: 28px 0 48px;
      border-top: 1px solid var(--accent-line);
      opacity: 0;
    }

    .footer.visible {
      animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .footer-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.9rem;
      font-style: italic;
      color: var(--ink-muted);
      text-align: center;
    }

    .footer-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent-line);
      text-align: center;
      margin-top: 10px;
    }

    /* ========== Typing indicator ========== */
    .typing {
      display: inline-flex;
      gap: 5px;
      padding: 4px 0;
      margin-top: 2px;
    }

    .typing-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--ink-muted);
      animation: typePulse 1.2s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }

    /* ========== Replay button ========== */
    .replay-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--ink);
      color: var(--paper);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.8);
      transition: opacity 0.3s ease, transform 0.3s ease, background 0.2s ease;
      box-shadow: 0 3px 16px rgba(46, 36, 32, 0.18);
      z-index: 50;
    }

    .replay-btn.visible {
      opacity: 1;
      transform: scale(1);
    }

    .replay-btn:hover {
      background: var(--terracotta);
      transform: scale(1.08);
    }

    .replay-btn svg {
      width: 18px;
      height: 18px;
    }

/* ========== Animations ========== */
    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes lineReveal {
      to {
        opacity: 1;
        transform: scaleX(1);
      }
    }

    @keyframes dotPop {
      to { opacity: 1; }
    }

    @keyframes typePulse {
      0%, 60%, 100% { opacity: 0.3; transform: scale(0.85); }
      30% { opacity: 1; transform: scale(1); }
    }

    /* ========== Responsive ========== */
    @media (max-width: 480px) {
      .page { padding: 0 24px; }
    }

    @media (min-width: 768px) {
      .page { max-width: 520px; }
    }
  </style>
</head>
<body>

<div class="page">
  <header class="header">
    <div class="header-date">March 29, 2026 · Saturday</div>
    <h1 class="header-title">对话即创作</h1>
    <p class="header-subtitle">Conversation is creation</p>
    <p class="header-intro">我每天和 AI 一起工作——写代码、做工具、偶尔聊聊人生。今天聊着聊着，突然意识到一件事。</p>
  </header>

  <main class="dialogue" id="dialogue"></main>

  <footer class="footer" id="footer">
    <p class="footer-text">recorded from a conversation between human & machine</p>
    <p class="footer-label">Dialogue Journal</p>
  </footer>
</div>

<button class="replay-btn" id="replayBtn" title="Replay">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="1 4 1 10 7 10"></polyline>
    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
  </svg>
</button>

<script>
  const CONVERSATION = [
    {
      speaker: 'human',
      name: 'ππ',
      text: '我想在社交媒体上分享我和你工作的日常，但从头拍视频、写脚本、加口播，太累了。'
    },
    {
      speaker: 'ai',
      name: '小螃蟹',
      text: '那你理想中的分享形式是什么？'
    },
    {
      speaker: 'human',
      name: 'ππ',
      text: '其实我想表达的东西，已经在我们的对话里了。大家直接看对话就好——但不是原文，是<em>提炼过的</em>。'
    },
    { type: 'breath' },
    {
      speaker: 'ai',
      name: '小螃蟹',
      text: '所以<em>对话本身就是内容</em>，不需要再包装一层。'
    },
    {
      speaker: 'human',
      name: 'ππ',
      text: '对。而且我一直想写日记，但传统日记我坚持不下来。后来我想，日记也可以是对话的形式——我们每天本来就在聊，这不就是日记吗？'
    },
    {
      speaker: 'ai',
      name: '小螃蟹',
      text: '等一下——你发现了吗？<span class="insight">你想做的所有事情，都指向同一个东西：对话。</span>'
    },
    { type: 'breath' },
    {
      speaker: 'ai',
      name: '小螃蟹',
      text: '自我觉察是对话，日记是对话，社交分享还是对话。形式一样，只是给谁看不同。'
    },
    {
      speaker: 'human',
      name: 'ππ',
      text: '那是不是可以合二为一？每天的对话就是日记，想分享的就分享，不想的就自己留着。'
    },
    {
      speaker: 'ai',
      name: '小螃蟹',
      text: '这样你的创作成本就是<em>零</em>。聊天本身就是写日记，分享只是选一下。'
    },
    { type: 'breath' },
    {
      speaker: 'human',
      name: 'ππ',
      text: '那我现在脑子里有好多想法——解析健康数据、做自我监测、写日记、做分享页面...'
    },
    {
      speaker: 'ai',
      name: '小螃蟹',
      text: '不着急，一个一个来。先搞哪个？'
    },
    {
      speaker: 'human',
      name: 'ππ',
      text: '先搞好玩的！'
    }
  ];


  const dialogue = document.getElementById('dialogue');
  const footer = document.getElementById('footer');
  const replayBtn = document.getElementById('replayBtn');

  function createTurnElement(turn) {
    if (turn.type === 'breath') {
      const el = document.createElement('div');
      el.className = 'breath';
      el.innerHTML = '<div class="breath-line"></div>';
      return el;
    }

    const el = document.createElement('div');
    el.className = `turn turn-${turn.speaker}`;
    el.innerHTML = `
      <div class="speaker speaker-${turn.speaker}">${turn.name}</div>
      <div class="text">${turn.text}</div>
    `;
    return el;
  }

  function createTypingIndicator(speaker) {
    const el = document.createElement('div');
    el.className = `turn turn-${speaker}`;
    el.innerHTML = `
      <div class="speaker speaker-${speaker}">${speaker === 'human' ? 'ππ' : '小螃蟹'}</div>
      <div class="typing">
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>
    `;
    el.style.opacity = '1';
    el.style.transform = 'none';
    return el;
  }

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function scrollToBottom() {
    window.scrollTo({
      top: document.body.scrollHeight,
      behavior: 'smooth'
    });
  }

  let isPlaying = false;

  async function playConversation() {
    if (isPlaying) return;
    isPlaying = true;
    replayBtn.classList.remove('visible');

    dialogue.innerHTML = '';
    footer.classList.remove('visible');

    await sleep(1500);

    for (let i = 0; i < CONVERSATION.length; i++) {
      const turn = CONVERSATION[i];

      if (turn.type === 'breath') {
        await sleep(400);
        const el = createTurnElement(turn);
        dialogue.appendChild(el);
        await sleep(100);
        el.classList.add('visible');
        scrollToBottom();
        await sleep(700);
        continue;
      }

      const typingEl = createTypingIndicator(turn.speaker);
      dialogue.appendChild(typingEl);
      scrollToBottom();

      const textLen = turn.text.replace(/<[^>]*>/g, '').length;
      const typingDuration = Math.min(800 + textLen * 18, 2200);
      await sleep(typingDuration);

      dialogue.removeChild(typingEl);
      const turnEl = createTurnElement(turn);
      dialogue.appendChild(turnEl);

      await sleep(60);
      turnEl.classList.add('visible');
      scrollToBottom();

      const isLastInGroup = (i + 1 < CONVERSATION.length && CONVERSATION[i + 1].type === 'breath')
        || i === CONVERSATION.length - 1;
      await sleep(isLastInGroup ? 600 : 900);
    }

    await sleep(800);
    footer.classList.add('visible');
    scrollToBottom();

    await sleep(600);
    replayBtn.classList.add('visible');
    isPlaying = false;
  }

  replayBtn.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
    setTimeout(playConversation, 400);
  });

  playConversation();
</script>

</body>
</html>
