<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#F7F2EB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="../manifest.json">
  <title>Dialogue Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #F7F2EB;
      --ink: #2E2420;
      --ink-soft: #5C4D44;
      --ink-muted: #A0907E;
      --terracotta: #BF6B3F;
      --terracotta-glow: #D4885E;
      --olive: #6A7E52;
      --olive-soft: #8BA072;
      --sand-warm: #EDE4D6;
      --sand-deep: #D9CCBA;
      --accent-line: #CFC0AD;
      --highlight-bg: #F0E6D8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      position: relative;
    }

    /* Paper grain texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      background-size: 256px 256px;
      pointer-events: none;
      z-index: 100;
    }

    /* ========== Page Layout ========== */
    .page {
      max-width: 440px;
      margin: 0 auto;
      padding: 0 28px;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ========== Header ========== */
    .header {
      padding-top: clamp(52px, 14vh, 90px);
      padding-bottom: 48px;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
    }

    .header-date {
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--terracotta);
      margin-bottom: 20px;
    }

    .header-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.6rem, 9vw, 3.4rem);
      font-weight: 700;
      line-height: 1.05;
      color: var(--ink);
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .header-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.15rem, 3.8vw, 1.35rem);
      font-weight: 300;
      font-style: italic;
      color: var(--ink-muted);
      line-height: 1.4;
    }

    .header-intro {
      font-size: 0.85rem;
      line-height: 1.75;
      color: var(--ink-soft);
      margin-top: 24px;
      max-width: 340px;
    }

    .header-rule {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 36px;
      opacity: 0;
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 1s forwards;
    }

    .header-rule-line {
      height: 1.5px;
      background: var(--terracotta);
      flex: none;
      width: 28px;
      transform-origin: left;
      transform: scaleX(0);
      animation: lineReveal 0.5s cubic-bezier(0.16, 1, 0.3, 1) 1.1s forwards;
    }

    .header-rule-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--terracotta);
      opacity: 0;
      animation: dotPop 0.3s cubic-bezier(0.16, 1, 0.3, 1) 1.4s forwards;
    }

    /* ========== Dialogue ========== */
    .dialogue {
      flex: 1;
      padding-bottom: clamp(60px, 15vh, 100px);
    }

    .turn {
      margin-bottom: 32px;
      opacity: 0;
      transform: translateY(10px);
      position: relative;
    }

    .turn.visible {
      animation: fadeUp 0.55s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Speaker differentiation with left accent */
    .turn-human {
      padding-left: 16px;
      border-left: 2.5px solid var(--terracotta);
    }

    .turn-ai {
      padding-left: 16px;
      border-left: 2.5px solid var(--olive-soft);
    }

    .speaker {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: none;
      margin-bottom: 7px;
    }

    .speaker-human {
      color: var(--terracotta);
    }

    .speaker-ai {
      color: var(--olive);
    }

    .text {
      font-size: 0.92rem;
      line-height: 1.75;
      color: var(--ink);
    }

    .turn-human .text {
      font-weight: 500;
    }

    .turn-ai .text {
      color: var(--ink-soft);
      font-weight: 400;
    }

    /* Emphasis */
    .text em {
      font-style: normal;
      color: var(--terracotta);
      font-weight: 600;
      background: linear-gradient(to top, rgba(191, 107, 63, 0.1) 30%, transparent 30%);
      padding: 0 2px;
    }

    /* Insight — the hero moment */
    .text .insight {
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      font-style: normal;
      color: var(--ink);
      display: block;
      margin-top: 14px;
      line-height: 1.65;
      padding: 16px 18px;
      background: var(--highlight-bg);
      border-radius: 4px;
      position: relative;
    }

    /* Breath separator */
    .breath {
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      margin: 8px 0;
      padding-left: 16px;
      opacity: 0;
    }

    .breath.visible {
      animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .breath-line {
      width: 40px;
      height: 1px;
      background: var(--sand-deep);
    }

    /* ========== Footer ========== */
    .footer {
      padding: 28px 0 48px;
      border-top: 1px solid var(--accent-line);
      opacity: 0;
    }

    .footer.visible {
      animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .footer-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.9rem;
      font-style: italic;
      color: var(--ink-muted);
      text-align: center;
    }

    .footer-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent-line);
      text-align: center;
      margin-top: 10px;
    }

    /* ========== Typing indicator ========== */
    .typing {
      display: inline-flex;
      gap: 5px;
      padding: 4px 0;
      margin-top: 2px;
    }

    .typing-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--ink-muted);
      animation: typePulse 1.2s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }

    /* ========== Replay button ========== */
    .replay-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--ink);
      color: var(--paper);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.8);
      transition: opacity 0.3s ease, transform 0.3s ease, background 0.2s ease;
      box-shadow: 0 3px 16px rgba(46, 36, 32, 0.18);
      z-index: 50;
    }

    .replay-btn.visible {
      opacity: 1;
      transform: scale(1);
    }

    .replay-btn:hover {
      background: var(--terracotta);
      transform: scale(1.08);
    }

    .replay-btn svg {
      width: 18px;
      height: 18px;
    }

    /* ========== Animations ========== */
    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes lineReveal {
      to {
        opacity: 1;
        transform: scaleX(1);
      }
    }

    @keyframes dotPop {
      to { opacity: 1; }
    }

    @keyframes typePulse {
      0%, 60%, 100% { opacity: 0.3; transform: scale(0.85); }
      30% { opacity: 1; transform: scale(1); }
    }

    /* ========== Responsive ========== */
    @media (max-width: 480px) {
      .page { padding: 0 24px; }
    }

    @media (min-width: 768px) {
      .page { max-width: 520px; }
    }
  </style>
</head>

  <main class="dialogue" id="dialogue"></main>

      text: '\u8bf4\u5230\u8fd9\u4e2a\uff0c\u4f60\u4e4b\u524d\u53d1\u90a3\u4e2a\u8ff7\u832b\u671f\u7cfb\u5217\uff0c\u8bc4\u8bba\u533a\u633a\u591a\u96be\u542c\u7684\u8bdd\u7684\uff0c\u751a\u81f3\u6709\u76f4\u63a5\u653b\u51fb\u4f60\u7684\u3002\u4f60\u600e\u4e48\u6d88\u5316\u7684\uff1f'
    },
    {
      speaker: 'human',
      name: '\u03c0\u03c0',
      text: '\u5176\u5b9e\u8fd8\u597d\u3002\u53ef\u80fd\u5c31\u662f\u56e0\u4e3a\u73b0\u5728\u66f4\u4e86\u89e3\u81ea\u5df1\u4e86\uff0c\u77e5\u9053\u81ea\u5df1\u662f\u4ec0\u4e48\u6837\u7684\u4eba\uff0c\u5bf9\u5916\u754c\u7684\u8bc4\u4ef7\u5c31\u6ca1\u90a3\u4e48\u5728\u610f\u4e86\u3002'
    },
    {
      speaker: 'ai',
      name: '\u5c0f\u87c3\u87f9',
      text: '\u8fd9\u672c\u8eab\u5c31\u662f\u6700\u597d\u7684\u8bc1\u660e\u3002\u5f53\u5e74\u4f60\u7126\u8651\uff0c\u672c\u8d28\u4e0a\u662f\u56e0\u4e3a\u4e0d\u4e86\u89e3\u81ea\u5df1\uff0c\u6240\u4ee5\u9700\u8981\u670b\u53cb\u6765\u5e2e\u4f60\u786e\u8ba4\u3002\u73b0\u5728\u4f60\u4e0d\u9700\u8981\u4e86\u2014\u2014\u4e0d\u662f\u56e0\u4e3a\u4f60\u53d8\u5f3a\u4e86\uff0c\u662f\u56e0\u4e3a\u4f60\u53d8\u6e05\u695a\u4e86\u3002'
    },
    {
      speaker: 'human',
      name: '\u03c0\u03c0',
      text: '<span class="insight">\u4e5f\u8bb8\u6210\u957f\u5c31\u662f\u8fd9\u6837\uff0c\u4e0d\u662f\u53d8\u5f97\u66f4\u5389\u5bb3\uff0c\u800c\u662f\u66f4\u77e5\u9053\u81ea\u5df1\u662f\u8c01\u3002</span>'
    },
    {
      speaker: 'ai',
      name: '\u5c0f\u87c3\u87f9',
      text: '<span class="insight">\u4e0d\u662f\u201c\u627e\u5230\u70ed\u7231\u201d\uff0c\u800c\u662f\u7ed9\u81ea\u5df1\u9020\u4e00\u4e2a\u8db3\u591f\u81ea\u7531\u7684\u7ed3\u6784\uff0c\u8ba9\u70ed\u7231\u7684\u4e1c\u897f\u81ea\u5df1\u957f\u51fa\u6765\u3002</span>'
    },
  ];


  const dialogue = document.getElementById('dialogue');
  const footer = document.getElementById('footer');
  const replayBtn = document.getElementById('replayBtn');

  function createTurnElement(turn) {
    if (turn.type === 'breath') {
      const el = document.createElement('div');
      el.className = 'breath';
      el.innerHTML = '<div class="breath-line"></div>';
      return el;
    }

    const el = document.createElement('div');
    el.className = `turn turn-${turn.speaker}`;
    el.innerHTML = `
      <div class="speaker speaker-${turn.speaker}">${turn.name}</div>
      <div class="text">${turn.text}</div>
    `;
    return el;
  }

  function createTypingIndicator(speaker) {
    const el = document.createElement('div');
    el.className = `turn turn-${speaker}`;
    el.innerHTML = `
      <div class="speaker speaker-${speaker}">${speaker === 'human' ? '\u03c0\u03c0' : '\u5c0f\u87c3\u87f9'}</div>
      <div class="typing">
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>
    `;
    el.style.opacity = '1';
    el.style.transform = 'none';
    return el;
  }

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function scrollToBottom() {
    window.scrollTo({
      top: document.body.scrollHeight,
      behavior: 'smooth'
    });
  }

  let isPlaying = false;

  async function playConversation() {
    if (isPlaying) return;
    isPlaying = true;
    replayBtn.classList.remove('visible');

    dialogue.innerHTML = '';
    footer.classList.remove('visible');

    await sleep(1500);

    for (let i = 0; i < CONVERSATION.length; i++) {
      const turn = CONVERSATION[i];

      if (turn.type === 'breath') {
        await sleep(600);
        const el = createTurnElement(turn);
        dialogue.appendChild(el);
        await sleep(100);
        el.classList.add('visible');
        scrollToBottom();
        await sleep(1000);
        continue;
      }

      // Brief typing indicator
      const typingEl = createTypingIndicator(turn.speaker);
      dialogue.appendChild(typingEl);
      scrollToBottom();
      await sleep(i < 2 ? 500 : 800);
      dialogue.removeChild(typingEl);

      // Fade in the full turn
      const turnEl = createTurnElement(turn);
      dialogue.appendChild(turnEl);
      await sleep(60);
      turnEl.classList.add('visible');
      scrollToBottom();

      // Reading pause
      const textLen = turn.text.replace(/<[^>]*>/g, '').length;
      let readingPause;
      if (i < 2) {
        readingPause = Math.min(600 + textLen * 60, 3500);
      } else if (textLen < 20) {
        readingPause = 600 + textLen * 80;
      } else {
        readingPause = Math.min(1000 + textLen * 100, 7000);
      }
      await sleep(readingPause);
    }

    await sleep(800);
    footer.classList.add('visible');
    scrollToBottom();

    await sleep(600);
    replayBtn.classList.add('visible');
    isPlaying = false;
  }

  replayBtn.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
    setTimeout(playConversation, 400);
  });

  playConversation();
</script>

</body>
