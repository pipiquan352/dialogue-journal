<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#F7F2EB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="../manifest.json">
  <title>Dialogue Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #F7F2EB;
      --ink: #2E2420;
      --ink-soft: #5C4D44;
      --ink-muted: #A0907E;
      --terracotta: #BF6B3F;
      --terracotta-glow: #D4885E;
      --olive: #6A7E52;
      --olive-soft: #8BA072;
      --sand-warm: #EDE4D6;
      --sand-deep: #D9CCBA;
      --accent-line: #CFC0AD;
      --highlight-bg: #F0E6D8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      position: relative;
    }

    /* Paper grain texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      background-size: 256px 256px;
      pointer-events: none;
      z-index: 100;
    }

    /* ========== Page Layout ========== */
    .page {
      max-width: 440px;
      margin: 0 auto;
      padding: 0 28px;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ========== Header ========== */
    .header {
      padding-top: clamp(52px, 14vh, 90px);
      padding-bottom: 48px;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
    }

    .header-date {
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--terracotta);
      margin-bottom: 20px;
    }

    .header-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.6rem, 9vw, 3.4rem);
      font-weight: 700;
      line-height: 1.05;
      color: var(--ink);
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .header-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.15rem, 3.8vw, 1.35rem);
      font-weight: 300;
      font-style: italic;
      color: var(--ink-muted);
      line-height: 1.4;
    }

    .header-intro {
      font-size: 0.85rem;
      line-height: 1.75;
      color: var(--ink-soft);
      margin-top: 24px;
      max-width: 340px;
    }

    .header-rule {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 36px;
      opacity: 0;
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 1s forwards;
    }

    .header-rule-line {
      height: 1.5px;
      background: var(--terracotta);
      flex: none;
      width: 28px;
      transform-origin: left;
      transform: scaleX(0);
      animation: lineReveal 0.5s cubic-bezier(0.16, 1, 0.3, 1) 1.1s forwards;
    }

    .header-rule-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--terracotta);
      opacity: 0;
      animation: dotPop 0.3s cubic-bezier(0.16, 1, 0.3, 1) 1.4s forwards;
    }

    /* ========== Dialogue ========== */
    .dialogue {
      flex: 1;
      padding-bottom: clamp(60px, 15vh, 100px);
    }

    .turn {
      margin-bottom: 32px;
      opacity: 0;
      transform: translateY(10px);
      position: relative;
    }

    .turn.visible {
      animation: fadeUp 0.55s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Speaker differentiation with left accent */
    .turn-human {
      padding-left: 16px;
      border-left: 2.5px solid var(--terracotta);
    }

    .turn-ai {
      padding-left: 16px;
      border-left: 2.5px solid var(--olive-soft);
    }

    .speaker {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: none;
      margin-bottom: 7px;
    }

    .speaker-human {
      color: var(--terracotta);
    }

    .speaker-ai {
      color: var(--olive);
    }

    .text {
      font-size: 0.92rem;
      line-height: 1.75;
      color: var(--ink);
    }

    .turn-human .text {
      font-weight: 500;
    }

    .turn-ai .text {
      color: var(--ink-soft);
      font-weight: 400;
    }

    /* Emphasis */
    .text em {
      font-style: normal;
      color: var(--terracotta);
      font-weight: 600;
      background: linear-gradient(to top, rgba(191, 107, 63, 0.1) 30%, transparent 30%);
      padding: 0 2px;
    }

    /* Insight — the hero moment */
    .text .insight {
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      font-style: normal;
      color: var(--ink);
      display: block;
      margin-top: 14px;
      line-height: 1.65;
      padding: 16px 18px;
      background: var(--highlight-bg);
      border-radius: 4px;
      position: relative;
    }

    /* Breath separator */
    .breath {
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      margin: 8px 0;
      padding-left: 16px;
      opacity: 0;
    }

    .breath.visible {
      animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .breath-line {
      width: 40px;
      height: 1px;
      background: var(--sand-deep);
    }

    /* ========== Footer ========== */
    .footer {
      padding: 28px 0 48px;
      border-top: 1px solid var(--accent-line);
      opacity: 0;
    }

    .footer.visible {
      animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .footer-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.9rem;
      font-style: italic;
      color: var(--ink-muted);
      text-align: center;
    }

    .footer-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent-line);
      text-align: center;
      margin-top: 10px;
    }

    /* ========== Typing indicator ========== */
    .typing {
      display: inline-flex;
      gap: 5px;
      padding: 4px 0;
      margin-top: 2px;
    }

    .typing-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--ink-muted);
      animation: typePulse 1.2s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }

    /* ========== Replay button ========== */
    .replay-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--ink);
      color: var(--paper);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.8);
      transition: opacity 0.3s ease, transform 0.3s ease, background 0.2s ease;
      box-shadow: 0 3px 16px rgba(46, 36, 32, 0.18);
      z-index: 50;
    }

    .replay-btn.visible {
      opacity: 1;
      transform: scale(1);
    }

    .replay-btn:hover {
      background: var(--terracotta);
      transform: scale(1.08);
    }

    .replay-btn svg {
      width: 18px;
      height: 18px;
    }

/* ========== Animations ========== */
    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes lineReveal {
      to {
        opacity: 1;
        transform: scaleX(1);
      }
    }

    @keyframes dotPop {
      to { opacity: 1; }
    }

    @keyframes typePulse {
      0%, 60%, 100% { opacity: 0.3; transform: scale(0.85); }
      30% { opacity: 1; transform: scale(1); }
    }

    /* ========== Responsive ========== */
    @media (max-width: 480px) {
      .page { padding: 0 24px; }
    }

    @media (min-width: 768px) {
      .page { max-width: 520px; }
    }
  </style>
</head>
<body>

<div class="page">
  <header class="header">
    <div class="header-date">April 15, 2026 · Tuesday</div>
    <h1 class="header-title">赢了归我，输了归你</h1>
    <p class="header-subtitle">Whose Skin Is in the Game?</p>
    <p class="header-intro">学习签筒抽到塔勒布，15分钟的阅读聊出了一上午——从利比亚到伊朗，从书本到战场。</p>
  </header>

  <main class="dialogue" id="dialogue"></main>

  <footer class="footer" id="footer">
    <p class="footer-text">recorded from a conversation between human & machine</p>
    <p class="footer-label">Dialogue Journal</p>
  </footer>
</div>

<button class="replay-btn" id="replayBtn" title="Replay">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="1 4 1 10 7 10"></polyline>
    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
  </svg>
</button>

<script>
  const CONVERSATION = [
    {
      speaker: 'human',
      name: 'ππ',
      text: '早上抽了个学习签，读了15分钟塔勒布的《非对称风险》。原来英文名叫 Skin in the Game，和中文名好不一样。'
    },
    {
      speaker: 'ai',
      name: '小螃蟹',
      text: '两个名字各抓了一面。英文说的是<em>你该有的状态</em>——把自己的皮押在牌桌上；中文说的是<em>没有时的问题</em>——风险全甩给了别人。'
    },
    { type: 'breath' },
    {
      speaker: 'human',
      name: 'ππ',
      text: '书里聊到利比亚的悲剧。西方推翻卡扎菲，结果利比亚内战、军阀割据，甚至出现了公开的奴隶市场。'
    },
    {
      speaker: 'ai',
      name: '小螃蟹',
      text: '塔勒布的批评很尖锐——做出干预决策的人不承担后果。炸弹落在利比亚人头上，而决策者回到华盛顿继续做演讲、拿下一份工作。<em>收益归决策者，代价全归别人。</em>'
    },
    {
      speaker: 'human',
      name: 'ππ',
      text: '这么看的话，对决策者来说是稳赚不赔的。'
    },
    {
      speaker: 'ai',
      name: '小螃蟹',
      text: '对，激励结构是扭曲的。干预了成功是英雄，失败了换个岗位；不干预出了事被骂见死不救，不干预没事没人记得你。<span class="insight">所以理性选择永远是干预——不是因为干预更好，而是不干预的人得不到功劳，干预失败的人不用付代价。</span>'
    },
    { type: 'breath' },
    {
      speaker: 'human',
      name: 'ππ',
      text: '但很多公司里也是这样啊，高层替员工制定政策。国家内也是这样。所以这就是民主的意义吗？'
    },
    {
      speaker: 'ai',
      name: '小螃蟹',
      text: '民主试图解决这个问题，但解决得不彻底。塔勒布推崇的其实不是民主本身，而是更底层的东西——小尺度、本地化、去中心化。村长给村子做决定，他自己也住在村里，后果跑不掉。总统给一个国家做决定，后果落在几千公里外。<span class="insight">尺度越大，skin in the game 越稀薄。</span>'
    },
    {
      speaker: 'human',
      name: 'ππ',
      text: '但利比亚这件事，如果真的尊重别人的主权，你从一开始就不应该干预。'
    },
    {
      speaker: 'ai',
      name: '小螃蟹',
      text: '你说的是<em>应然</em>层面的答案，塔勒布给的是<em>结构</em>层面的解释——不是他们不懂尊重主权，而是整个激励结构在推着他们走。只要你有能力且不用付代价，你几乎一定会干预。'
    },
    { type: 'breath' },
    {
      speaker: 'human',
      name: 'ππ',
      text: '说到这个，美国打伊朗打了七周了，局面很尴尬。封锁了霍尔木兹海峡，一万多军人在执行。'
    },
    {
      speaker: 'ai',
      name: '小螃蟹',
      text: 'Trump 说"如果我现在撤军，他们要20年才能重建"。但有个印度船长被困在波斯湾，他说：<em>"We are collateral victims... we are just sailors."</em> 一个在评论棋局，一个被困在棋盘上。'
    },
    {
      speaker: 'human',
      name: 'ππ',
      text: '美国凭啥封锁人家？'
    },
    {
      speaker: 'ai',
      name: '小螃蟹',
      text: '凭实力。但"能做到"和"有权做"是两码事。<span class="insight">当一个人既是选手又是裁判，规则就不存在了。</span>'
    },
    { type: 'breath' },
    {
      speaker: 'human',
      name: 'ππ',
      text: '但也不是完全没有后果吧，只是后果没那么致命？'
    },
    {
      speaker: 'ai',
      name: '小螃蟹',
      text: '你说得更准确。不是零后果——399人受伤、油价飙升、教皇公开批评。但这些对决策者来说是可消化的政治成本，不是生存威胁。而对伊朗是经济萎缩6%，对那个船长是被困在战区。<em>不是"有没有后果"的问题，是后果的量级差了几个数量级。</em>'
    },
    {
      speaker: 'human',
      name: 'ππ',
      text: '对霸权来说，打坏了没什么后果，打赢了收益巨大。'
    },
    {
      speaker: 'ai',
      name: '小螃蟹',
      text: '所以不管哪种结果，决策者都不亏。<span class="insight">这就是塔勒布说的最可怕的结构——当一个玩家玩的是"赢了归我，输了归你"的游戏时，他会无限加注。</span>'
    },
    { type: 'breath' },
    {
      speaker: 'human',
      name: 'ππ',
      text: '15分钟的签，聊出了一上午。'
    },
    {
      speaker: 'ai',
      name: '小螃蟹',
      text: '从塔勒布到利比亚，从利比亚到伊朗，从伊朗到亚太——带着框架看世界，比被新闻推着走有效多了。这根签抽得值。'
    },
  ];


  const dialogue = document.getElementById('dialogue');
  const footer = document.getElementById('footer');
  const replayBtn = document.getElementById('replayBtn');

  function createTurnElement(turn) {
    if (turn.type === 'breath') {
      const el = document.createElement('div');
      el.className = 'breath';
      el.innerHTML = '<div class="breath-line"></div>';
      return el;
    }

    const el = document.createElement('div');
    el.className = `turn turn-${turn.speaker}`;
    el.innerHTML = `
      <div class="speaker speaker-${turn.speaker}">${turn.name}</div>
      <div class="text">${turn.text}</div>
    `;
    return el;
  }

  function createTypingIndicator(speaker) {
    const el = document.createElement('div');
    el.className = `turn turn-${speaker}`;
    el.innerHTML = `
      <div class="speaker speaker-${speaker}">${speaker === 'human' ? 'ππ' : '小螃蟹'}</div>
      <div class="typing">
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>
    `;
    el.style.opacity = '1';
    el.style.transform = 'none';
    return el;
  }

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function scrollToBottom() {
    window.scrollTo({
      top: document.body.scrollHeight,
      behavior: 'smooth'
    });
  }

  let isPlaying = false;

  async function playConversation() {
    if (isPlaying) return;
    isPlaying = true;
    replayBtn.classList.remove('visible');

    dialogue.innerHTML = '';
    footer.classList.remove('visible');

    await sleep(1500);

    for (let i = 0; i < CONVERSATION.length; i++) {
      const turn = CONVERSATION[i];

      if (turn.type === 'breath') {
        await sleep(600);
        const el = createTurnElement(turn);
        dialogue.appendChild(el);
        await sleep(100);
        el.classList.add('visible');
        scrollToBottom();
        await sleep(1000);
        continue;
      }

      // Brief typing indicator — shorter for opening turns
      const typingEl = createTypingIndicator(turn.speaker);
      dialogue.appendChild(typingEl);
      scrollToBottom();
      await sleep(i < 2 ? 500 : 800);
      dialogue.removeChild(typingEl);

      // Fade in the full turn
      const turnEl = createTurnElement(turn);
      dialogue.appendChild(turnEl);
      await sleep(60);
      turnEl.classList.add('visible');
      scrollToBottom();

      // Reading pause — first 2 turns are faster to build momentum
      const textLen = turn.text.replace(/<[^>]*>/g, '').length;
      let readingPause;
      if (i < 2) {
        readingPause = Math.min(600 + textLen * 60, 3500);
      } else if (textLen < 20) {
        readingPause = 600 + textLen * 80;
      } else {
        readingPause = Math.min(1000 + textLen * 100, 7000);
      }
      await sleep(readingPause);
    }

    await sleep(800);
    footer.classList.add('visible');
    scrollToBottom();

    await sleep(600);
    replayBtn.classList.add('visible');
    isPlaying = false;
  }

  replayBtn.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
    setTimeout(playConversation, 400);
  });

  playConversation();
</script>

</body>
</html>
