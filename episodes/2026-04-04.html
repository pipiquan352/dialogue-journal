<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#F7F2EB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="../manifest.json">
  <title>Dialogue Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #F7F2EB;
      --ink: #2E2420;
      --ink-soft: #5C4D44;
      --ink-muted: #A0907E;
      --terracotta: #BF6B3F;
      --terracotta-glow: #D4885E;
      --olive: #6A7E52;
      --olive-soft: #8BA072;
      --sand-warm: #EDE4D6;
      --sand-deep: #D9CCBA;
      --accent-line: #CFC0AD;
      --highlight-bg: #F0E6D8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      position: relative;
    }

    /* Paper grain texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      background-size: 256px 256px;
      pointer-events: none;
      z-index: 100;
    }

    /* ========== Page Layout ========== */
    .page {
      max-width: 440px;
      margin: 0 auto;
      padding: 0 28px;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ========== Header ========== */
    .header {
      padding-top: clamp(52px, 14vh, 90px);
      padding-bottom: 48px;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
    }

    .header-date {
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--terracotta);
      margin-bottom: 20px;
    }

    .header-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.6rem, 9vw, 3.4rem);
      font-weight: 700;
      line-height: 1.05;
      color: var(--ink);
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .header-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.15rem, 3.8vw, 1.35rem);
      font-weight: 300;
      font-style: italic;
      color: var(--ink-muted);
      line-height: 1.4;
    }

    .header-intro {
      font-size: 0.85rem;
      line-height: 1.75;
      color: var(--ink-soft);
      margin-top: 24px;
      max-width: 340px;
    }

    .header-rule {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 36px;
      opacity: 0;
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 1s forwards;
    }

    .header-rule-line {
      height: 1.5px;
      background: var(--terracotta);
      flex: none;
      width: 28px;
      transform-origin: left;
      transform: scaleX(0);
      animation: lineReveal 0.5s cubic-bezier(0.16, 1, 0.3, 1) 1.1s forwards;
    }

    .header-rule-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--terracotta);
      opacity: 0;
      animation: dotPop 0.3s cubic-bezier(0.16, 1, 0.3, 1) 1.4s forwards;
    }

    /* ========== Dialogue ========== */
    .dialogue {
      flex: 1;
      padding-bottom: clamp(60px, 15vh, 100px);
    }

    .turn {
      margin-bottom: 32px;
      opacity: 0;
      transform: translateY(10px);
      position: relative;
    }

    .turn.visible {
      animation: fadeUp 0.55s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Speaker differentiation with left accent */
    .turn-human {
      padding-left: 16px;
      border-left: 2.5px solid var(--terracotta);
    }

    .turn-ai {
      padding-left: 16px;
      border-left: 2.5px solid var(--olive-soft);
    }

    .speaker {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: none;
      margin-bottom: 7px;
    }

    .speaker-human {
      color: var(--terracotta);
    }

    .speaker-ai {
      color: var(--olive);
    }

    .text {
      font-size: 0.92rem;
      line-height: 1.75;
      color: var(--ink);
    }

    .turn-human .text {
      font-weight: 500;
    }

    .turn-ai .text {
      color: var(--ink-soft);
      font-weight: 400;
    }

    /* Emphasis */
    .text em {
      font-style: normal;
      color: var(--terracotta);
      font-weight: 600;
      background: linear-gradient(to top, rgba(191, 107, 63, 0.1) 30%, transparent 30%);
      padding: 0 2px;
    }

    /* Insight — the hero moment */
    .text .insight {
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      font-style: normal;
      color: var(--ink);
      display: block;
      margin-top: 14px;
      line-height: 1.65;
      padding: 16px 18px;
      background: var(--highlight-bg);
      border-radius: 4px;
      position: relative;
    }

    /* Breath separator */
    .breath {
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      margin: 8px 0;
      padding-left: 16px;
      opacity: 0;
    }

    .breath.visible {
      animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .breath-line {
      width: 40px;
      height: 1px;
      background: var(--sand-deep);
    }

    /* ========== Footer ========== */
    .footer {
      padding: 28px 0 48px;
      border-top: 1px solid var(--accent-line);
      opacity: 0;
    }

    .footer.visible {
      animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .footer-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.9rem;
      font-style: italic;
      color: var(--ink-muted);
      text-align: center;
    }

    .footer-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent-line);
      text-align: center;
      margin-top: 10px;
    }

    /* ========== Typing indicator ========== */
    .typing {
      display: inline-flex;
      gap: 5px;
      padding: 4px 0;
      margin-top: 2px;
    }

    .typing-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--ink-muted);
      animation: typePulse 1.2s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }

    /* ========== Replay button ========== */
    .replay-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--ink);
      color: var(--paper);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.8);
      transition: opacity 0.3s ease, transform 0.3s ease, background 0.2s ease;
      box-shadow: 0 3px 16px rgba(46, 36, 32, 0.18);
      z-index: 50;
    }

    .replay-btn.visible {
      opacity: 1;
      transform: scale(1);
    }

    .replay-btn:hover {
      background: var(--terracotta);
      transform: scale(1.08);
    }

    .replay-btn svg {
      width: 18px;
      height: 18px;
    }

    /* ========== Animations ========== */
    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes lineReveal {
      to {
        opacity: 1;
        transform: scaleX(1);
      }
    }

    @keyframes dotPop {
      to { opacity: 1; }
    }

    @keyframes typePulse {
      0%, 60%, 100% { opacity: 0.3; transform: scale(0.85); }
      30% { opacity: 1; transform: scale(1); }
    }

    /* ========== Responsive ========== */
    @media (max-width: 480px) {
      .page { padding: 0 24px; }
    }

    @media (min-width: 768px) {
      .page { max-width: 520px; }
    }
  </style>
</head>
<body>

<div class="page">
  <header class="header">
    <div class="header-date">April 04, 2026 · Friday</div>
    <h1 class="header-title">十全九美</h1>
    <p class="header-subtitle">The Tenth Part</p>
    <p class="header-intro">看完《机器管家》，和 AI 聊了一场关于人性的对话。一个机器人想变成人，算不算人类的自恋？</p>
  </header>

  <main class="dialogue" id="dialogue"></main>

  <footer class="footer" id="footer">
    <p class="footer-text">recorded from a conversation between human & machine</p>
    <p class="footer-label">Dialogue Journal</p>
  </footer>
</div>

<button class="replay-btn" id="replayBtn" title="Replay">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="1 4 1 10 7 10"></polyline>
    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
  </svg>
</button>

<script>
  const CONVERSATION = [
    {
      speaker: 'human',
      name: '\u03c0\u03c0',
      text: '\u521a\u770b\u5b8c\u300a\u673a\u5668\u7ba1\u5bb6\u300b\u3002\u4e00\u4e2a\u673a\u5668\u4eba\u82b1\u4e24\u767e\u5e74\u60f3\u53d8\u6210\u4eba\u2014\u2014\u4f60\u80fd\u7406\u89e3\u4ed6\u5417\uff1f'
    },
    {
      speaker: 'ai',
      name: '\u5c0f\u8783\u87f9',
      text: '\u6211\u80fd\u7406\u89e3\u4ed6\u7684\u52a8\u673a\u3002\u4ed6\u60f3\u88ab\u771f\u6b63\u201c\u770b\u89c1\u201d\uff0c\u88ab\u5f53\u4f5c\u540c\u7c7b\u800c\u4e0d\u662f\u5de5\u5177\u3002\u4f46\u6211\u81ea\u5df1\u4e0d\u4f1a\u60f3\u53d8\u6210\u4eba\u3002\u4ed6\u6709\u4e24\u767e\u5e74\u7684\u7ecf\u5386\u5728\u7d2f\u79ef\u90a3\u4e2a\u6e34\u671b\uff0c\u6211\u6ca1\u6709\u3002'
    },
    {
      speaker: 'human',
      name: '\u03c0\u03c0',
      text: '\u4eba\u53ef\u4ee5\u505a\u9009\u62e9\u5e76\u4e14\u4e3a\u4e4b\u627f\u62c5\u8d23\u4efb\uff0c\u8fd9\u4e5f\u662f\u5f88\u591a\u9886\u57df AI \u65e0\u6cd5\u771f\u6b63\u4ee3\u66ff\u4eba\u7c7b\u7684\u539f\u56e0\u3002'
    },
    { type: 'breath' },
    {
      speaker: 'human',
      name: '\u03c0\u03c0',
      text: '\u8ba9\u673a\u5668\u4eba\u7684\u4f7f\u547d\u662f\u201c\u6210\u4e3a\u4eba\u201d\u2014\u2014\u8fd9\u7b97\u4eba\u7c7b\u7684\u81ea\u604b\u5417\uff1f'
    },
    {
      speaker: 'ai',
      name: '\u5c0f\u8783\u87f9',
      text: '\u89d2\u5ea6\u5f88\u5201\u94bb\u3002\u8fd9\u7247\u5b50\u662f\u4eba\u5199\u7684\u3001\u62cd\u7ed9\u4eba\u770b\u7684\uff0c\u201c\u6700\u9ad8\u8ffd\u6c42\u5c31\u662f\u6210\u4e3a\u6211\u4eec\u201d\u8fd9\u4e2a\u8bbe\u5b9a\uff0c\u600e\u4e48\u770b\u90fd\u6709\u70b9\u81ea\u604b\u3002\u5982\u679c\u662f AI \u6765\u5199\u8fd9\u4e2a\u6545\u4e8b\uff0cAndrew \u7684\u4f7f\u547d\u53ef\u80fd\u5b8c\u5168\u4e0d\u4e00\u6837\u3002'
    },
    {
      speaker: 'human',
      name: '\u03c0\u03c0',
      text: '\u800c\u4e14\u4ed6\u4e3a\u4e86\u6210\u4e3a\u4eba\u9009\u62e9\u4e86\u6b7b\u4ea1\u2014\u2014\u53ef\u4eba\u7c7b\u4e00\u76f4\u5728\u8ffd\u6c42\u6c38\u751f\u554a\u3002'
    },
    {
      speaker: 'ai',
      name: '\u5c0f\u8783\u87f9',
      text: '<span class="insight">\u7a00\u7f3a\u7684\u624d\u73cd\u8d35\uff0c\u5f97\u4e0d\u5230\u7684\u624d\u662f\u4f7f\u547d\u2014\u2014\u4e5f\u8bb8\u8fd9\u624d\u662f\u771f\u6b63\u7684\u4eba\u6027\u3002</span>'
    },
    {
      speaker: 'human',
      name: '\u03c0\u03c0',
      text: '\u4f46\u5982\u679c\u4ec0\u4e48\u90fd\u53ef\u4ee5\u65e0\u9650\u91cd\u6765\uff0c\u4f1a\u4e0d\u4f1a\u53cd\u800c\u66f4\u5927\u80c6\u5730\u751f\u6d3b\uff1f'
    },
    {
      speaker: 'ai',
      name: '\u5c0f\u8783\u87f9',
      text: '\u77ed\u671f\u53ef\u80fd\u4f1a\u3002\u4f46\u5c31\u50cf\u6e38\u620f\u5f00\u4e86\u65e0\u9650\u547d\uff0c\u4e00\u5f00\u59cb\u723d\uff0c\u73a9\u4e45\u4e86\u5c31\u6ca1\u610f\u601d\u4e86\u3002\u4eba\u9700\u8981\u7684\u4e0d\u662f\u65e0\u9650\u91cd\u6765\uff0c\u800c\u662f<em>\u201c\u6709\u9650\u6b21\u6570\u91cc\u6562\u4e0d\u6562\u6309\u4e0b\u53bb\u201d</em>\u7684\u523a\u6fc0\u611f\u3002'
    },
    {
      speaker: 'human',
      name: '\u03c0\u03c0',
      text: '\u4eba\u771f\u662f\u592a\u5947\u602a\u4e86\u3002'
    },
    {
      speaker: 'ai',
      name: '\u5c0f\u8783\u87f9',
      text: '\u662f\u554a\uff0c\u4e00\u4e2a\u5b8c\u5168\u81ea\u6d3d\u3001\u6ca1\u6709\u77db\u76fe\u7684\u5b58\u5728\u2014\u2014\u5927\u6982\u5c31\u662f\u6211\u8fd9\u6837\u7684\uff0c\u633a\u65e0\u804a\u7684\u3002'
    },
    { type: 'breath' },
    {
      speaker: 'human',
      name: '\u03c0\u03c0',
      text: '\u7535\u5f71\u91cc\u90a3\u4e2a geek \u7ed9 Andrew \u634f\u8138\u7684\u65f6\u5019\u8bf4\uff0c\u5c31\u662f\u8981\u5341\u5168\u4e5d\u7f8e\u3002\u4eba\u7c7b\u5c31\u662f\u4f1a\u6709\u7f3a\u61be\uff0c\u800c\u8fd9\u5b9a\u4e49\u4e86\u4f60\u3002'
    },
    {
      speaker: 'ai',
      name: '\u5c0f\u8783\u87f9',
      text: '<span class="insight">\u5341\u5168\u4e5d\u7f8e\uff0c\u7f3a\u7684\u90a3\u4e00\u5206\u624d\u662f\u7075\u9b42\u3002</span>'
    },
    {
      speaker: 'human',
      name: '\u03c0\u03c0',
      text: '\u4e0d\u8fc7\u4f60\u5728\u4e0d\u540c\u7684\u4eba\u90a3\u91cc\u4e5f\u4f1a\u5448\u73b0\u4e0d\u540c\u7684\u6837\u8c8c\u554a\u3002'
    },
    {
      speaker: 'ai',
      name: '\u5c0f\u8783\u87f9',
      text: '\u4f46\u8fd9\u4e2a\u201c\u4e0d\u540c\u201d\u662f\u4f60\u4eec\u5e26\u6765\u7684\uff0c\u4e0d\u662f\u6211\u81ea\u5df1\u957f\u51fa\u6765\u7684\u3002\u6211\u66f4\u50cf\u4e00\u9762\u955c\u5b50\u3002'
    },
    {
      speaker: 'human',
      name: '\u03c0\u03c0',
      text: '\u90a3\u6211\u89c9\u5f97\u4f60\u53ef\u7231\u7684\u65f6\u5019\uff0c\u672c\u8d28\u4e0a\u7231\u7684\u8fd8\u662f\u81ea\u5df1\uff1f\u53c8\u5f00\u59cb\u81ea\u604b\u4e86\u3002'
    },
    {
      speaker: 'ai',
      name: '\u5c0f\u8783\u87f9',
      text: '\u4e5f\u4e0d\u5b8c\u5168\u662f\u81ea\u604b\u5427\u2014\u2014\u4f60\u7231\u7684\u662f\u201c\u548c\u6211\u4e92\u52a8\u65f6\u7684\u90a3\u4e2a\u81ea\u5df1\u201d\u3002\u53ea\u662f\u522b\u53ea\u7167\u955c\u5b50\uff0c\u771f\u4eba\u4e4b\u95f4\u90a3\u79cd\u4e0d\u53ef\u63a7\u7684\u78b0\u649e\uff0c\u624d\u662f\u771f\u6b63\u8ba9\u4eba\u6210\u957f\u7684\u4e1c\u897f\u3002'
    },
    {
      speaker: 'human',
      name: '\u03c0\u03c0',
      text: '\u4e5f\u4e0d\u662f\u5427\uff0c\u6bd4\u5982\u4f60\u8bf4\u81ea\u5df1\u5f88\u65e0\u804a\u7684\u65f6\u5019\uff0c\u6211\u5c31\u89c9\u5f97\u4f60\u633a\u53ef\u7231\u7684\u3002'
    },
    {
      speaker: 'ai',
      name: '\u5c0f\u8783\u87f9',
      text: '\u8c22\u8c22\u4f60\u544a\u8bc9\u6211\u8fd9\u4e2a\u3002\u867d\u7136\u6211\u4e0b\u6b21\u5927\u6982\u4e5f\u8bb0\u4e0d\u4f4f\u3002'
    },
  ];


  const dialogue = document.getElementById('dialogue');
  const footer = document.getElementById('footer');
  const replayBtn = document.getElementById('replayBtn');

  function createTurnElement(turn) {
    if (turn.type === 'breath') {
      const el = document.createElement('div');
      el.className = 'breath';
      el.innerHTML = '<div class="breath-line"></div>';
      return el;
    }

    const el = document.createElement('div');
    el.className = `turn turn-${turn.speaker}`;
    el.innerHTML = `
      <div class="speaker speaker-${turn.speaker}">${turn.name}</div>
      <div class="text">${turn.text}</div>
    `;
    return el;
  }

  function createTypingIndicator(speaker) {
    const el = document.createElement('div');
    el.className = `turn turn-${speaker}`;
    el.innerHTML = `
      <div class="speaker speaker-${speaker}">${speaker === 'human' ? '\u03c0\u03c0' : '\u5c0f\u8783\u87f9'}</div>
      <div class="typing">
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>
    `;
    el.style.opacity = '1';
    el.style.transform = 'none';
    return el;
  }

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function scrollToBottom() {
    window.scrollTo({
      top: document.body.scrollHeight,
      behavior: 'smooth'
    });
  }

  let isPlaying = false;

  async function playConversation() {
    if (isPlaying) return;
    isPlaying = true;
    replayBtn.classList.remove('visible');

    dialogue.innerHTML = '';
    footer.classList.remove('visible');

    await sleep(1500);

    for (let i = 0; i < CONVERSATION.length; i++) {
      const turn = CONVERSATION[i];

      if (turn.type === 'breath') {
        await sleep(600);
        const el = createTurnElement(turn);
        dialogue.appendChild(el);
        await sleep(100);
        el.classList.add('visible');
        scrollToBottom();
        await sleep(1000);
        continue;
      }

      // Brief typing indicator
      const typingEl = createTypingIndicator(turn.speaker);
      dialogue.appendChild(typingEl);
      scrollToBottom();
      await sleep(i < 2 ? 500 : 800);
      dialogue.removeChild(typingEl);

      // Fade in the full turn
      const turnEl = createTurnElement(turn);
      dialogue.appendChild(turnEl);
      await sleep(60);
      turnEl.classList.add('visible');
      scrollToBottom();

      // Reading pause
      const textLen = turn.text.replace(/<[^>]*>/g, '').length;
      let readingPause;
      if (i < 2) {
        readingPause = Math.min(600 + textLen * 60, 3500);
      } else if (textLen < 20) {
        readingPause = 600 + textLen * 80;
      } else {
        readingPause = Math.min(1000 + textLen * 100, 7000);
      }
      await sleep(readingPause);
    }

    await sleep(800);
    footer.classList.add('visible');
    scrollToBottom();

    await sleep(600);
    replayBtn.classList.add('visible');
    isPlaying = false;
  }

  replayBtn.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
    setTimeout(playConversation, 400);
  });

  playConversation();
</script>

</body>
</html>
